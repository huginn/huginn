services:
  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 3

  test_mysql:
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    restart: "no"
    environment:
      CI: "true"
      CHROME_BIN: /usr/bin/google-chrome-stable
      DATABASE_ADAPTER: mysql2
      DATABASE_HOST: mysql
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: password
      TEST_DATABASE_NAME: huginn
    volumes:
      - ../../:/app
    depends_on:
      mysql:
        condition: service_healthy

  test_postgres:
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    restart: "no"
    environment:
      CI: "true"
      CHROME_BIN: /usr/bin/google-chrome-stable
      DATABASE_ADAPTER: postgresql
      DATABASE_HOST: postgres
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: password
      TEST_DATABASE_NAME: huginn
    volumes:
      - ../../:/app
    depends_on:
      postgres:
        condition: service_healthy
